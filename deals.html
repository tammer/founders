<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>How investible founders look and sound</title>
  <style>
    :root {
      --bg: #0f1218;
      --surface: #171b24;
      --border: #2a3142;
      --text: #e8eaef;
      --muted: #8b95a8;
      --accent: #6b9fff;
      --accent-soft: rgba(107, 159, 255, 0.14);
      --accent-glow: rgba(107, 159, 255, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    .hero-header {
      position: relative;
      max-width: 960px;
      margin: 0 auto;
      padding: 2.75rem 1.5rem 2.25rem;
      isolation: isolate;
    }

    .hero-header::before {
      content: "";
      position: absolute;
      inset: -20% -10% auto -10%;
      height: 140%;
      background:
        radial-gradient(ellipse 70% 55% at 20% 0%, var(--accent-soft), transparent 55%),
        radial-gradient(ellipse 50% 40% at 85% 15%, rgba(139, 149, 168, 0.08), transparent 50%);
      z-index: -1;
      pointer-events: none;
    }

    .hero-kicker {
      margin: 0 0 0.65rem;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .hero-header h1 {
      margin: 0;
      max-width: 18ch;
      font-size: clamp(1.65rem, 4.2vw, 2.45rem);
      font-weight: 700;
      line-height: 1.12;
      letter-spacing: -0.035em;
      text-wrap: balance;
    }

    .hero-header h1 em {
      font-style: normal;
      background: linear-gradient(105deg, var(--text) 0%, var(--text) 40%, var(--accent) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .hero-lede {
      margin-top: 1.35rem;
      max-width: 52ch;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .hero-lede > p {
      margin: 0;
      font-size: 1.05rem;
      line-height: 1.55;
      color: var(--muted);
    }

    .hero-lede > p strong {
      color: var(--text);
      font-weight: 600;
    }

    .hero-punch {
      position: relative;
      margin: 0;
      padding: 1rem 1rem 1rem 1.15rem;
      font-size: 1.02rem !important;
      line-height: 1.5 !important;
      color: var(--text) !important;
      font-weight: 500;
      letter-spacing: -0.01em;
      background: linear-gradient(135deg, var(--surface) 0%, rgba(23, 27, 36, 0.65) 100%);
      border: 1px solid var(--border);
      border-radius: 10px;
      box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.2), 0 12px 40px -20px var(--accent-glow);
    }

    .hero-punch::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0.65rem;
      bottom: 0.65rem;
      width: 3px;
      border-radius: 3px;
      background: linear-gradient(180deg, var(--accent), rgba(107, 159, 255, 0.35));
    }

    main {
      max-width: 960px;
      margin: 0 auto;
      padding: 0 1.5rem 3rem;
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    .deal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    .deal-body {
      padding: 1.25rem 1.5rem;
      display: grid;
      gap: 1.25rem;
      align-items: start;
      grid-template-columns: 1fr;
    }

    .deal-body--split {
      grid-template-columns: minmax(0, 1fr) minmax(260px, min(42vw, 420px));
    }

    @media (max-width: 720px) {
      .deal-body--split {
        grid-template-columns: 1fr;
      }
    }

    .deal-facts {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      min-width: 0;
    }

    .meta-row {
      font-size: 0.9rem;
      color: var(--muted);
    }

    .meta-row span.label {
      color: var(--text);
      font-weight: 500;
      margin-right: 0.35rem;
    }

    .deal-media-col {
      min-width: 0;
      width: 100%;
    }

    .deal-media-col .video-wrap {
      margin: 0;
      max-width: none;
    }

    .video-wrap {
      position: relative;
      width: 100%;
      max-width: 420px;
      margin: 0 auto;
      aspect-ratio: 16 / 9;
      background: #000;
      border-radius: 8px;
      overflow: hidden;
    }

    .video-wrap iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }

    .error {
      padding: 1rem 1.5rem;
      background: #2a1a1a;
      border: 1px solid #5c3030;
      border-radius: 12px;
      color: #f0b4b4;
      font-size: 0.9rem;
    }

    .empty {
      color: var(--muted);
      text-align: center;
      padding: 2rem;
    }
  </style>
</head>
<body>
  <header class="hero-header">
    <p class="hero-kicker">Necessary but not sufficient</p>
    <h1>Here's how investible founders look and sound</h1>
    <div class="hero-lede">
      <p>
        When I discover a <strong>Canada-based</strong> founder who has raised meaningful rounds
        (seed, A, B, C, etc.), I check them out to see what they look and sound like.
      </p>
      <!-- <p class="hero-punch">
        I have yet to find a funded founding CEO who doesn't communicate at the levels you will see here.
      </p> -->
    </div>
  </header>
  <main id="root"></main>

  <script>
    function parseYoutubeStart(value) {
      if (value == null || value === "") return 0;
      const s = String(value);
      const plain = s.match(/^(\d+)/);
      if (plain) return parseInt(plain[1], 10);
      let sec = 0;
      const h = s.match(/(\d+)h/);
      const m = s.match(/(\d+)m/);
      const ss = s.match(/(\d+)s/);
      if (h) sec += parseInt(h[1], 10) * 3600;
      if (m) sec += parseInt(m[1], 10) * 60;
      if (ss) sec += parseInt(ss[1], 10);
      return sec;
    }

    function youtubeEmbedUrl(url) {
      try {
        const u = new URL(url, window.location.href);
        let id = "";
        let start = 0;

        const startParam = u.searchParams.get("start") || u.searchParams.get("t");
        if (startParam != null) start = parseYoutubeStart(startParam);

        if (u.hostname === "youtu.be" || u.hostname === "www.youtu.be") {
          id = u.pathname.replace(/^\//, "").split("/")[0];
        } else if (u.hostname.includes("youtube.com")) {
          if (u.pathname.startsWith("/embed/")) {
            const embedId = u.pathname.split("/")[2];
            const qs = new URLSearchParams(u.search);
            const st = qs.get("start") || qs.get("t");
            const embedStart = st != null ? parseYoutubeStart(st) : 0;
            const q = embedStart > 0 ? `?start=${embedStart}` : "";
            return `https://www.youtube.com/embed/${embedId}${q}`;
          }
          if (u.pathname.startsWith("/shorts/")) {
            id = u.pathname.split("/")[2];
          } else {
            id = u.searchParams.get("v") || "";
          }
        }

        if (!id) return null;
        const q = start > 0 ? `?start=${start}` : "";
        return `https://www.youtube.com/embed/${id}${q}`;
      } catch {
        return null;
      }
    }

    function renderKeyValueRow(key, value) {
      return `<div class="meta-row"><span class="label">${escapeHtml(
        key
      )}</span>${escapeHtml(String(value))}</div>`;
    }

    function renderVideoIframe(embed) {
      return `<div class="video-wrap">
            <iframe
              src="${escapeHtml(embed)}"
              title="YouTube"
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
              allowfullscreen
              referrerpolicy="strict-origin-when-cross-origin"
            ></iframe>
            </div>`;
    }

    function renderDeal(item) {
      const factChunks = [];
      let primaryEmbed = "";
      for (const key of Object.keys(item)) {
        const value = item[key];
        if (key.toLowerCase() === "youtube") {
          const raw =
            value == null ? "" : typeof value === "string" ? value : String(value);
          const trimmed = raw.trim();
          const embed = trimmed ? youtubeEmbedUrl(trimmed) : null;
          if (embed) {
            if (!primaryEmbed) primaryEmbed = embed;
            else factChunks.push(renderKeyValueRow(key, raw));
          } else if (trimmed) {
            factChunks.push(renderKeyValueRow(key, raw));
          }
        } else {
          factChunks.push(renderKeyValueRow(key, value));
        }
      }
      const splitClass = primaryEmbed ? " deal-body--split" : "";
      const videoCol = primaryEmbed
        ? `<div class="deal-media-col">${renderVideoIframe(primaryEmbed)}</div>`
        : "";
      return `<article class="deal"><div class="deal-body${splitClass}"><div class="deal-facts">${factChunks.join(
        ""
      )}</div>${videoCol}</div></article>`;
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text;
      return div.innerHTML;
    }

    async function main() {
      const root = document.getElementById("root");
      try {
        const res = await fetch("deals.json", { cache: "no-store" });
        if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
        const data = await res.json();
        if (!Array.isArray(data) || data.length === 0) {
          root.innerHTML =
            '<p class="empty">No deals in <code>deals.json</code>.</p>';
          return;
        }
        root.innerHTML = data.map(renderDeal).join("");
      } catch (e) {
        root.innerHTML = `<div class="error">
          Could not load <code>deals.json</code>. Open this page via a local server
          (e.g. <code>python3 -m http.server</code> in this folder) so the browser can fetch the file.
          <br /><br />
          <small>${escapeHtml(String(e.message || e))}</small>
        </div>`;
      }
    }

    main();
  </script>
</body>
</html>
